<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraft</title>
    <!-- Markdown渲染扩展库CSS -->
    <!-- highlight.js 代码高亮样式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
    <!-- KaTeX 数学公式样式 -->
    <link rel="stylesheet" href="/katex/katex.min.css" />
    <!-- Mermaid 图表样式 (暂时禁用，因为CDN问题) -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.css" integrity="sha512-4RgN3KNC4nqGZO9cQvCfgUhHlF2l6iI3lRwQ3oKcgm1dt7+ssn3zu5fd4G15j2+z7r5N1GAV8Nt7GSi7tKcK7w==" crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
    <!-- 自定义Markdown样式 -->
    <style>
      .markdown-table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        font-size: 0.9em;
      }
      .markdown-table th,
      .markdown-table td {
        border: 1px solid #ddd;
        padding: 8px 12px;
        text-align: left;
      }
      .markdown-table th {
        background-color: #f2f2f2;
        font-weight: 600;
      }
      .markdown-table tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      .custom-block {
        padding: 12px 16px;
        margin: 1em 0;
        border-left: 4px solid;
        border-radius: 4px;
      }
      .custom-block.warning {
        background-color: #fff8e6;
        border-left-color: #ffc107;
      }
      .custom-block.info {
        background-color: #e8f4fd;
        border-left-color: #1890ff;
      }
      /* 确保代码块在深色主题下可读 */
      .message-item.user .message-text pre code {
        background-color: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      /* 全局Markdown元素样式 */
      .message-text pre {
        background-color: #f6f8fa;
        border-radius: 6px;
        padding: 12px;
        overflow: auto;
        font-size: 0.9em;
        line-height: 1.5;
        margin: 0.5em 0;
      }
      .message-text code {
        background-color: #f6f8fa;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }
      .message-text pre code {
        background-color: transparent;
        padding: 0;
      }
      .message-text blockquote {
        border-left: 4px solid #1890ff;
        margin: 1em 0;
        padding-left: 1em;
        color: #666;
      }
      .message-text ul,
      .message-text ol {
        padding-left: 1.5em;
        margin: 0.5em 0;
      }
      .message-text li {
        margin-bottom: 0.25em;
      }
      .message-text h1,
      .message-text h2,
      .message-text h3,
      .message-text h4,
      .message-text h5,
      .message-text h6 {
        margin-top: 1em;
        margin-bottom: 0.5em;
        font-weight: 600;
        line-height: 1.25;
      }
      .message-text h1 { font-size: 1.5em; }
      .message-text h2 { font-size: 1.3em; }
      .message-text h3 { font-size: 1.2em; }
      .message-text h4 { font-size: 1.1em; }
      .message-text h5 { font-size: 1em; }
      .message-text h6 { font-size: 0.9em; }
      /* 数学公式样式 */
      .message-text .katex {
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
