# 服务器配置
server:
  # 服务器端口
  port: 8084
# Spring配置
spring:
  # 允许循环引用（AgentForkManager ↔ ToolExecutor 通过工具形成良性循环）
  main:
    allow-circular-references: true
  # 应用名称配置
  application:
    # 应用名称
    name: CodeCraft
  # 激活 local profile，自动加载 application-local.yml（覆盖优先级高于本文件）
  # 如果没有 application-local.yml，项目会使用下方的默认值启动，但数据库连接会失败
  profiles:
    active: local
  # 数据源配置
  datasource:
    # H2 内嵌数据库驱动
    driver-class-name: org.h2.Driver
    # H2 文件数据库（数据持久化到文件，重启不丢失）+ MySQL 兼容模式
    url: 'jdbc:h2:file:./data/codecraft;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC'
    # H2 默认用户名/密码
    username: sa
    password:
    # Hikari连接池配置
    hikari:
      # 最大连接池大小
      maximum-pool-size: 10
      # 最小空闲连接数
      minimum-idle: 5
      # 连接超时（毫秒）
      connection-timeout: 30000
      # 空闲超时（毫秒）
      idle-timeout: 600000
      # 最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 是否自动提交
      auto-commit: true
  # SQL初始化配置
  sql:
    # 初始化模式配置
    init:
      # 初始化模式：always表示启动时执行schema.sql建表
      mode: always
      # 建表出错时继续执行（表已存在时不中断）
      continue-on-error: true

  # 定时任务线程池配置
  task:
    scheduling:
      pool:
        size: 3
  # 缓存配置（使用 Caffeine 本地缓存）
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h

# MyBatis配置
mybatis:
  # 类型别名包路径
  type-aliases-package: com.example.agentdeepseek
  # MyBatis配置项
  configuration:
    # 下划线转驼峰命名映射
    map-underscore-to-camel-case: true

# SpringDoc OpenAPI配置
springdoc:
  # API文档路径配置
  api-docs:
    # API文档JSON路径
    path: /api-docs
  # Swagger UI配置
  swagger-ui:
    # Swagger UI访问路径
    path: /swagger-ui.html
    # 是否启用Swagger UI
    enabled: true
  # 缓存配置
  cache:
    # 是否禁用缓存
    disabled: true
  # 是否显示Actuator端点
  show-actuator: false

# Milvus向量数据库配置
milvus:
  host: localhost # Milvus服务器主机地址
  port: 19530 # Milvus服务器端口
  database: milvusds # Milvus数据库名称
  token: # Milvus认证token（可选）
  secure: false # 是否使用TLS安全连接
  connect-timeout: 10000 # 连接超时时间（毫秒）
  keep-alive-timeout: 30000 # 连接保活时间（毫秒）

# 文件删除工具配置
delete-file:
  # 受保护目录列表（相对项目根目录），删除操作会拒绝删除这些目录及其子文件
  protected-directories:
    - .git
    - node_modules
    - target
    - build
    - .idea
  # 目录删除前警告阈值，超过此文件数会要求用户二次确认
  directory-deletion-warning-threshold: 20

# 编辑文件工具后处理配置（EditFileTool）
edit-file:
  # 编辑后自动格式化配置
  formatter:
    enabled: true                    # 是否启用编辑后自动格式化
    timeout: 30000                   # 格式化超时（毫秒）
  # 编辑后自动诊断配置
  diagnostic:
    enabled: true                    # 是否启用编辑后自动诊断
    level: fast                      # 诊断级别：fast（单文件快速检查）/ full（项目级编译检查）
    timeout: 15000                   # 诊断超时（毫秒）

# 网络工具统一配置（web_search / web_fetch / http_request / check_network）
network-tool:
  search-max-results: 8                       # 搜索结果最大条数（Bing RSS 搜索）
  fetch-connect-timeout: 5000                 # 网页抓取连接超时（ms）
  fetch-read-timeout: 15000                   # 网页抓取读取超时（ms）
  fetch-max-content-length: 100000            # 网页内容最大长度（字符）
  fetch-user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  http-request-connect-timeout: 10000         # HTTP 请求连接超时（ms）
  http-request-read-timeout: 30000            # HTTP 请求读取超时（ms）
  http-request-max-response-bytes: 51200      # HTTP 请求响应体上限（字节）
  http-request-allowed-methods:               # HTTP 请求允许的方法白名单
    - GET
    - POST
    - PUT
    - DELETE
  network-check-sites:                        # check_network 默认检测站点列表
    - https://www.google.com
    - https://github.com
    - https://huggingface.co
    - https://api.deepseek.com
  connectivity-check-timeout: 5000            # 连通性检测超时（ms）
  proxy:
    enabled: false                            # 是否启用代理
    host: 127.0.0.1                           # 代理主机地址
    port: 7890                                # 代理端口（Clash 默认 7890）

# 网页读取工具配置
web-fetch:
  # HTTP代理配置（用于访问国内无法直连的网站，如 huggingface.co）
  proxy:
    enabled: false # 是否启用代理
    host: 127.0.0.1 # 代理主机地址
    port: 7890 # 代理端口（Clash 默认 7890）

# DeepSeek API配置
deepseek:
  # DeepSeek API基础URL
  base-url: https://api.deepseek.com
  # API密钥——由 application-local.yml 覆盖
  api-key: ${DEEPSEEK_API_KEY:__MUST_CONFIGURE_API_KEY__}
  # 默认模型
  default-model: deepseek-v4-pro
  # 思考模式：non-thinking / thinking / thinking_max
  thinking-mode: thinking
  # 上下文最大 token 数（DeepSeek 模型为 1M）
  max-context-tokens: 1000000
  # 上下文智能压缩配置
  compaction:
    enabled: true              # 是否启用智能压缩
    warning-threshold: 0.7     # 黄色预警阈值（token 用量 > 70% 时标记）
    compact-threshold: 0.85    # 橙色压缩阈值（> 85% 时立即执行 LLM 压缩）
    drop-threshold: 0.95       # 红色丢弃阈值（压缩后仍 > 95% 时执行滑动窗口丢弃）
    protect-rounds: 2          # 保护带轮数（最近的 N 轮对话不压缩不丢弃）
    batch-size: 10             # 每批压缩的最大轮数
    model: ""                  # 压缩使用的模型（留空使用 default-model）
    async-precompress: true    # 是否启用异步预压缩（请求完成后后台压缩，下次请求零延迟）
  # 附件上传配置
  upload:
    max-size: 5242880                              # 最大文件大小（5MB）
    allowed-extensions: .txt,.md,.json,.yml,.yaml,.xml,.java,.py,.ts,.vue,.js,.css,.sql,.sh,.bat,.csv,.properties,.go,.kt,.rs,.c,.cpp,.h,.html,.htm,.svg,.log,.ini,.cfg,.gradle,.proto,.graphql
    image-extensions: .png,.jpg,.jpeg,.gif,.bmp,.webp,.ico
  # 提示词文件与工具组映射
  tool-groups:
    "code_agent_prompt.txt":
      - "web_search"
      - "web_fetch"
      - "read_file"
      - "write_file"
      - "edit_file"
      - "glob_files"
      - "grep_search"
      - "read_project_tree"
      - "project_info"
      - "run_command"
      - "run_server"
      - "ask_clarification"
      - "task_manager"
      - "check_network"
      - "execute_sql"
      - "delete_file"
      - "http_request"
      - "service_control"
      - "git_status"
      - "git_diff"
      - "git_log"
      - "git_add"
      - "git_commit"
      - "git_branch"
      - "git_push"
      - "manage_skill"
      - "report_skill_result"
      - "fork_agent"
      - "collect_agent"
      - "inspect_agent"

# ==================== P2P 远程连接配置 ====================
p2p:
  # 是否启用 P2P 功能
  enabled: true
  # P2P 监听端口（IPv6 TCP）
  port: 9527
  # 心跳间隔（秒）
  heartbeat-interval: 15
  # 心跳超时（秒），超时判定对端离线
  heartbeat-timeout: 60
  # 重连基础延迟（秒），指数退避起点
  reconnect-base-delay: 1
  # 重连最大延迟（秒），指数退避上限
  reconnect-max-delay: 60
  # 最大消息帧大小（字节），默认 10MB
  max-frame-length: 10485760
  # 自签名证书有效期（天）
  cert-validity-days: 365
  # 证书存储目录（相对于项目根目录）
  cert-dir: data/p2p/certs
  # 在线节点缓存过期时间（分钟）
  peer-cache-expire-minutes: 5
