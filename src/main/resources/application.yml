# 服务器配置
server:
  # 服务器端口
  port: 8080

# Spring配置
spring:
  # 应用名称配置
  application:
    # 应用名称
    name: agent-deepseek
  # 激活 local profile，自动加载 application-local.yml（覆盖优先级高于本文件）
  # 如果没有 application-local.yml，项目会使用下方的默认值启动，但数据库连接会失败
  profiles:
    active: local
  # 数据源配置
  datasource:
    # MySQL驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接URL
    url: 'jdbc:mysql://localhost:3306/agent_deepseek?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&verifyServerCertificate=false&nullCatalogMeansCurrent=true&useLegacyDatetimeCode=false'
    # 数据库用户名
    username: root
    # 数据库密码——由 application-local.yml 覆盖（profile 优先级更高）
    # 如未配置，请创建 application-local.yml 或在环境变量中设置 DB_PASSWORD
    password: ${DB_PASSWORD:__MUST_CONFIGURE_DB_PASSWORD__}
    # Hikari连接池配置
    hikari:
      # 最大连接池大小
      maximum-pool-size: 10
      # 最小空闲连接数
      minimum-idle: 5
      # 连接超时（毫秒）
      connection-timeout: 30000
      # 空闲超时（毫秒）
      idle-timeout: 600000
      # 最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 是否自动提交
      auto-commit: true
  # SQL初始化配置
  sql:
    # 初始化模式配置
    init:
      # 初始化模式：always表示启动时执行schema.sql建表
      mode: always
      # 建表出错时继续执行（表已存在时不中断）
      continue-on-error: true
  # MyBatis配置
  mybatis:
    # 类型别名包路径
    type-aliases-package: com.example.agentdeepseek
    # MyBatis配置项
    configuration:
      # 下划线转驼峰命名映射
      map-underscore-to-camel-case: true
  # 数据存储配置（Redis）
  data:
    # Redis配置
    redis:
      # Redis主机地址——由 application-local.yml 覆盖
      host: ${REDIS_HOST:__MUST_CONFIGURE_REDIS_HOST__}
      # Redis端口
      port: 6379
      # Redis密码——由 application-local.yml 覆盖
      password: ${REDIS_PASSWORD:__MUST_CONFIGURE_REDIS_PASSWORD__}
      # Redis数据库索引
      database: 0
      # 连接超时时间
      connect-timeout: 2000ms
      # Lettuce连接池配置
      lettuce:
        # 连接池配置
        pool:
          # 是否启用连接池
          enabled: true
          # 最大连接数
          max-size: 8
          # 最小空闲连接数
          min-idle: 0
  # 定时任务线程池配置
  task:
    scheduling:
      pool:
        size: 3

# SpringDoc OpenAPI配置
springdoc:
  # API文档路径配置
  api-docs:
    # API文档JSON路径
    path: /api-docs
  # Swagger UI配置
  swagger-ui:
    # Swagger UI访问路径
    path: /swagger-ui.html
    # 是否启用Swagger UI
    enabled: true
  # 缓存配置
  cache:
    # 是否禁用缓存
    disabled: true
  # 是否显示Actuator端点
  show-actuator: false

# Milvus向量数据库配置
milvus:
  host: localhost # Milvus服务器主机地址
  port: 19530 # Milvus服务器端口
  database: milvusds # Milvus数据库名称
  token: # Milvus认证token（可选）
  secure: false # 是否使用TLS安全连接
  connect-timeout: 10000 # 连接超时时间（毫秒）
  keep-alive-timeout: 30000 # 连接保活时间（毫秒）

# 文件删除工具配置
delete-file:
  # 受保护目录列表（相对项目根目录），删除操作会拒绝删除这些目录及其子文件
  protected-directories:
    - .git
    - node_modules
    - target
    - build
    - .idea
  # 目录删除前警告阈值，超过此文件数会要求用户二次确认
  delete-warning-threshold: 50

# 网络工具统一配置（web_search / web_fetch / http_request / check_network）
network-tool:
  searxng-url: http://localhost:8888/search  # SearXNG 搜索引擎地址
  search-max-results: 8                       # 搜索结果最大条数
  fetch-connect-timeout: 5000                 # 网页抓取连接超时（ms）
  fetch-read-timeout: 15000                   # 网页抓取读取超时（ms）
  fetch-max-content-length: 100000            # 网页内容最大长度（字符）
  fetch-user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  http-request-connect-timeout: 10000         # HTTP 请求连接超时（ms）
  http-request-read-timeout: 30000            # HTTP 请求读取超时（ms）
  http-request-max-response-bytes: 51200      # HTTP 请求响应体上限（字节）
  http-request-allowed-methods:               # HTTP 请求允许的方法白名单
    - GET
    - POST
    - PUT
    - DELETE
  network-check-sites:                        # check_network 默认检测站点列表
    - https://www.google.com
    - https://github.com
    - https://huggingface.co
    - https://api.deepseek.com
  connectivity-check-timeout: 5000            # 连通性检测超时（ms）
  proxy:
    enabled: false                            # 是否启用代理
    host: 127.0.0.1                           # 代理主机地址
    port: 7890                                # 代理端口（Clash 默认 7890）

# 网页读取工具配置
web-fetch:
  # HTTP代理配置（用于访问国内无法直连的网站，如 huggingface.co）
  proxy:
    enabled: false # 是否启用代理
    host: 127.0.0.1 # 代理主机地址
    port: 7890 # 代理端口（Clash 默认 7890）

# DeepSeek API配置
deepseek:
  # DeepSeek API基础URL
  base-url: https://api.deepseek.com
  # API密钥——由 application-local.yml 覆盖
  api-key: ${DEEPSEEK_API_KEY:__MUST_CONFIGURE_API_KEY__}
  # 默认模型
  default-model: deepseek-v4-pro
  # 思考模式：non-thinking / thinking / thinking_max
  thinking-mode: thinking
  # 提示词文件与工具组映射
  tool-groups:
    "system_prompt.txt":
      - "web_search"
      - "web_fetch"
      - "get_weather"
      - "create_skill"
      - "list_skills"
      - "delete_skill"
      - "report_skill_result"
    "code_agent_prompt.txt":
      - "web_search"
      - "web_fetch"
      - "read_file"
      - "write_file"
      - "edit_file"
      - "glob_files"
      - "grep_search"
      - "read_project_tree"
      - "project_info"
      - "run_command"
      - "run_background_command"
      - "code_analysis"
      - "ask_clarification"
      - "task_manager"
      - "check_network"
      - "execute_sql"
      - "delete_file"
      - "http_request"
      - "read_process_output"
      - "kill_process"
      - "list_processes"
      - "git_status"
      - "git_diff"
      - "git_log"
      - "git_add"
      - "git_commit"
      - "git_branch"
      - "git_push"
      - "create_skill"
      - "list_skills"
      - "delete_skill"
      - "report_skill_result"
    "romantic_chat_agent_prompt.txt": []
